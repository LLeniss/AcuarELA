<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AcuarELA — Catálogo</title>
  <meta name="description" content="Catálogo de obras - AcuarELA">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="site-title">AcuarELA</h1>

      <!-- Selector de idioma simple -->
      <nav class="lang-switch">
        <button data-lang="es" class="lang-btn">ES</button>
        <button data-lang="en" class="lang-btn">EN</button>
        <button data-lang="fr" class="lang-btn">FR</button>
      </nav>
    </div>
  </header>

  <main>
    <section id="catalogo" class="section">
      <div class="container">
        <h2 class="section__title" data-i18n="catalogo_title">Colección</h2>
        <p class="section__lead" data-i18n="catalogo_lead">Explora las piezas</p>

        <!-- Aquí inyecta app.js las tarjetas -->
        <div id="catalogo-grid" class="catalogo__grid"></div>
      </div>
    </section>
  </main>

  <!-- Lightbox/Dialog para ficha ampliada -->
  <dialog id="cat-lightbox" class="cat-lightbox" aria-hidden="true">
    <button class="lb__close" aria-label="Cerrar">&times;</button>
    <div class="lb__inner">
      <div class="lb__media">
        <img class="lb__img" src="" alt="">
      </div>
      <div class="lb__body">
        <h2 class="lb__title"></h2>
        <div class="lb__desc"></div>
        <div class="lb__ficha"></div>
        <div class="lb__actions">
          <button class="btn btn--primary lb__reserve">Reservar</button>
        </div>
      </div>
    </div>
  </dialog>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; AcuarELA</p>
    </div>
  </footer>

  <!-- Cargar i18n antes de app para que idioma esté disponible en render -->
  <script src="i18n.js"></script>
  <script src="app.js"></script>

  <script>
    // Enlazar botones del selector de idioma
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const lang = btn.getAttribute('data-lang');
          if (window.i18n && typeof window.i18n.setLanguage === 'function') {
            window.i18n.setLanguage(lang);
          } else {
            localStorage.setItem('lang', lang);
            // si i18n no está listo, fijamos atributo y forzamos event
            document.documentElement.setAttribute('lang', lang);
            window.dispatchEvent(new Event('langchange'));
          }
        });
      });
    });
  </script>
</body>
</html>
