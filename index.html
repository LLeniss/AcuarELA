<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="meta.title">Galería - AcuarELA</title>
  <meta name="description" content="" data-i18n-attr="content:meta.description" />
  <!-- Otros meta / OpenGraph ya presentes en tu proyecto pueden ir aquí -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header / nav (presérvalos si ya están en tu versión actual) -->
  <header class="site-header">
    <nav>
      <a href="/" class="brand">AcuarELA</a>
      <!-- navegación con data-i18n... -->
    </nav>
  </header>

  <!-- HERO (preservar si ya está) -->
  <main id="main">
    <section id="hero" class="hero">
      <div class="container">
        <h1 data-i18n="hero.title">Título principal</h1>
        <p data-i18n="hero.lead">Descripción principal</p>
      </div>
    </section>

    <!-- CATALOGO: aquí app.js inyecta las tarjetas dentro de #catalogo-grid -->
    <section id="catalogo" class="section">
      <div class="container">
        <div class="section-head">
          <h2 class="section-title" data-i18n="catalogo.title">Catálogo</h2>
          <p class="section-lead" data-i18n="catalogo.lead">Explora las obras</p>
        </div>

        <!-- CONTENEDOR donde app.js pinta las tarjetas -->
        <div id="catalogo-grid" class="catalogo-grid" aria-live="polite">
          <!-- tarjetas inyectadas dinámicamente por app.js -->
        </div>
      </div>
    </section>

    <!-- DIALOG / LIGHTBOX (opcional): app.js puede integrarlo; lo dejamos disponible -->
    <dialog id="cat-lightbox" class="cat-lightbox" aria-hidden="true">
      <button class="lb-close" aria-label="Cerrar">×</button>
      <div class="lb-inner">
        <div class="lb-media">
          <img class="lb-img" src="" alt="">
        </div>
        <div class="lb-body">
          <h2 class="lb-title"></h2>
          <div class="lb-desc"></div>
          <div class="lb-ficha"></div>
          <div class="lb-actions">
            <button class="btn lb-reserve">Reservar</button>
          </div>
        </div>
      </div>
    </dialog>

    <!-- Resto del contenido... -->
  </main>

  <footer class="site-footer">
    <div class="container">
      <p data-i18n="footer.copy">© 2026 AcuarELA</p>
    </div>
  </footer>

  <!-- SCRIPTS: carga primero i18n, luego app -->
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
